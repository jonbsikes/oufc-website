<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shop · Oklahoma United FC</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="assets/logo-club.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,75..125,400..900;1,75..125,400..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/oufc.css" />
</head>
<body>
<div class="page">
  <div data-nav data-active="Shop"></div>

  <section style="background:var(--ink);color:#fff;padding:0;position:relative;overflow:hidden;">
    <div style="max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1.3fr 1fr;min-height:460px;">
      <div style="padding:72px 48px;display:flex;flex-direction:column;justify-content:center;">
        <div class="font-mono" style="font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue-light);margin-bottom:18px;">— Drop 01 / The Inaugural Kit</div>
        <h1 class="font-display" style="font-size:clamp(56px, 9vw, 96px);font-weight:900;line-height:0.9;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:24px;">Wear<br/>the badge.</h1>
        <p style="font-size:17px;line-height:1.5;color:rgba(255,255,255,0.75);max-width:460px;margin-bottom:32px;">The first home kit in club history. Limited first run, manufactured by our partner.</p>
        <a class="btn btn-primary" href="https://www.oklahomaunitedfcstore.com/category/all-products" target="_blank" rel="noopener" style="align-self:flex-start;">Shop the Kit →</a>
      </div>
      <div class="ph">HOME KIT '26 · HERO IMAGE</div>
    </div>
  </section>

  <section style="padding:32px 48px;border-bottom:1px solid var(--line);">
    <div style="max-width:1440px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="font-display" style="padding:10px 16px;border:1px solid var(--line-strong);background:var(--ink);color:#fff;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">All</button>
      <button class="font-display" style="padding:10px 16px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Kits</button>
      <button class="font-display" style="padding:10px 16px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Training</button>
      <button class="font-display" style="padding:10px 16px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Headwear</button>
      <button class="font-display" style="padding:10px 16px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Accessories</button>
    </div>
  </section>

  <section style="padding:48px 48px 96px;max-width:1440px;margin:0 auto;">
    <div id="product-grid" style="display:grid;grid-template-columns:repeat(4, 1fr);gap:24px;"></div>
  </section>

  <div data-footer></div>
</div>

<script src="js/data.js"></script>
<script src="js/site.js"></script>
<script>
  (function () {
    var products = [
      { n: "Home Kit '26", p: "$89", tag: "NEW" },
      { n: "Away Kit '26", p: "$89", tag: "NEW" },
      { n: "GK Kit '26", p: "$89" },
      { n: "Training Top", p: "$54" },
      { n: "Training Shorts", p: "$38" },
      { n: "Crest Cap (Navy)", p: "$32" },
      { n: "Founders Scarf", p: "$28", tag: "LIMITED" },
      { n: "OUFC Hoodie", p: "$68" },
      { n: "OUFC Beanie", p: "$24" },
      { n: "Match Ball '26", p: "$45" },
      { n: "Crest Tee", p: "$32" },
      { n: "Pin Set", p: "$18" },
    ];
    var host = document.getElementById("product-grid");
    host.innerHTML = products.map(function (p) {
      var tagBg = p.tag === "LIMITED" ? "var(--gold)" : "var(--blue)";
      var tagColor = p.tag === "LIMITED" ? "var(--ink)" : "#fff";
      var tagHTML = p.tag ? '<div class="font-mono" style="position:absolute;top:12px;left:12px;background:' + tagBg + ';color:' + tagColor + ';padding:4px 8px;font-size:10px;letter-spacing:0.16em;font-weight:700;">' + p.tag + '</div>' : '';
      return '<div>' +
        '<div class="ph ph-light" style="aspect-ratio:4/5;margin-bottom:14px;position:relative;">' + p.n.toUpperCase() + tagHTML + '</div>' +
        '<div class="font-display" style="font-size:16px;font-weight:700;margin-bottom:4px;">' + p.n + '</div>' +
        '<div class="font-mono" style="font-size:13px;color:var(--blue);">' + p.p + '</div>' +
      '</div>';
    }).join("");
  })();
</script>
</body>
</html>
