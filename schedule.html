<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Schedule & Results · Oklahoma United FC</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="assets/logo-club.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,75..125,400..900;1,75..125,400..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/oufc.css" />
</head>
<body>
<div class="page">
  <div data-nav data-active="Schedule"></div>

  <section style="background:var(--navy);color:#fff;padding:72px 48px;">
    <div style="max-width:1440px;margin:0 auto;">
      <div class="font-mono" style="font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue-light);margin-bottom:18px;">— 2026 Inaugural Season · Red River Conference</div>
      <h1 class="font-display" style="font-size:clamp(56px, 9vw, 96px);font-weight:900;line-height:0.92;text-transform:uppercase;letter-spacing:-0.02em;">Schedule<br/>& Results</h1>
    </div>
  </section>

  <section style="padding:32px 48px;border-bottom:1px solid var(--line);">
    <div style="max-width:1440px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:var(--ink);color:#fff;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">All</button>
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Upcoming</button>
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Results</button>
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Home</button>
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Away</button>
      <button class="font-display" style="padding:10px 18px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;">Cup</button>
    </div>
  </section>

  <section style="padding:48px 48px 32px;max-width:1440px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:48px;align-items:start;">
      <div id="match-list" style="display:flex;flex-direction:column;gap:0;border:1px solid var(--line);"></div>
      <aside style="display:flex;flex-direction:column;gap:18px;position:sticky;top:24px;">
        <div class="eyebrow">— Season at a glance</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="border:1px solid var(--line);padding:20px 18px;">
            <div class="font-display" style="font-size:36px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:6px;">5</div>
            <div class="font-mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(15,15,16,0.55);">Home Fixtures</div>
          </div>
          <div style="border:1px solid var(--line);padding:20px 18px;">
            <div class="font-display" style="font-size:36px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:6px;">5</div>
            <div class="font-mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(15,15,16,0.55);">Away Fixtures</div>
          </div>
          <div style="border:1px solid var(--line);padding:20px 18px;">
            <div class="font-display" style="font-size:36px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:6px;">10</div>
            <div class="font-mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(15,15,16,0.55);">Total Matches</div>
          </div>
          <div style="border:1px solid var(--line);padding:20px 18px;">
            <div class="font-display" style="font-size:36px;font-weight:900;color:var(--blue);line-height:1;margin-bottom:6px;">$40</div>
            <div class="font-mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(15,15,16,0.55);">Season Pass</div>
          </div>
        </div>
        <img src="assets/schedule-infographic.jpg" alt="2026 Schedule" style="width:100%;border:1px solid var(--line);" />
        <a class="btn btn-primary" href="https://www.intix.com/org/oklahoma-united-fc" target="_blank" rel="noopener">Book Season Pass →</a>
      </aside>
    </div>
  </section>

  <div data-footer></div>
</div>

<script src="js/data.js"></script>
<script src="js/site.js"></script>
<script>
  (function () {
    var D = window.OUFC_DATA;
    var host = document.getElementById("match-list");
    var html = D.schedule.map(function (m, i) {
      var bg = i % 2 ? "transparent" : "rgba(15,15,16,0.02)";
      var border = i < D.schedule.length - 1 ? "1px solid var(--line)" : "none";
      var oufcImg = '<img src="assets/logo-club.png" alt="OUFC" style="width:38px;height:38px;object-fit:contain;" />';
      var oufcLabel = '<div class="font-display" style="font-size:18px;font-weight:800;color:var(--blue);">OUFC</div>';
      var oppImg = '<img src="' + m.logo + '" alt="' + m.opp + '" style="width:38px;height:38px;object-fit:contain;" />';
      var oppLabel = '<div class="font-display" style="font-size:18px;font-weight:700;color:var(--ink);">' + m.opp + '</div>';
      var vs = '<div class="font-mono" style="font-size:11px;color:rgba(15,15,16,0.4);margin:0 4px;">vs</div>';
      var matchup = m.home ? (oufcImg + oufcLabel + vs + oppImg + oppLabel) : (oppImg + oppLabel + vs + oufcImg + oufcLabel);
      var noteHTML = m.note ? '<div class="font-mono" style="font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--blue);margin-left:auto;padding:4px 8px;border:1px solid var(--blue);">' + m.note + '</div>' : '';
      var ctaHTML = m.home
        ? '<a class="btn btn-primary" href="' + D.ticketsUrl + '" target="_blank" rel="noopener" style="padding:10px 16px;font-size:11px;">Tickets</a>'
        : '<a class="btn btn-ghost" href="#" style="padding:10px 16px;font-size:11px;">Away</a>';
      return '<div style="display:grid;grid-template-columns:120px 1fr 130px 130px;align-items:center;padding:20px 24px;border-bottom:' + border + ';gap:20px;background:' + bg + ';">' +
          '<div>' +
            '<div class="font-display" style="font-size:22px;font-weight:800;letter-spacing:-0.005em;">' + m.date + '</div>' +
            '<div class="font-mono" style="font-size:10px;color:rgba(15,15,16,0.5);letter-spacing:0.14em;margin-top:2px;">' + m.day + '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">' + matchup + noteHTML + '</div>' +
          '<div class="font-mono" style="font-size:10px;color:rgba(15,15,16,0.6);letter-spacing:0.12em;text-transform:uppercase;">' + m.venue + '</div>' +
          '<div style="text-align:right;">' + ctaHTML + '</div>' +
        '</div>';
    }).join("");
    host.innerHTML = html;
  })();
</script>
</body>
</html>
